<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>读书谈 · 共读资源站</title>
  <meta property="og:title" content="读书谈 · 共读资源站">
  <meta property="og:description" content="一起读书，一起聊书。有深度、有温度的线上共读社群。">
  <meta property="og:type" content="website">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
  <style>
    /* ========================================
       CSS Design Tokens — Warm Literary Style
       ======================================== */
    :root {
      --color-bg:        #faf8f5;
      --color-bg-alt:    #f3efe8;
      --color-surface:   #ffffff;
      --color-text:      #2c2416;
      --color-text-2:    #6b5e4a;
      --color-text-3:    #9b8d7a;
      --color-accent:    #8b4513;
      --color-accent-h:  #a0522d;
      --color-accent-l:  #c67b3c;
      --color-accent-bg: #f5e6d3;
      --color-border:    rgba(139,69,19,0.12);
      --color-success:   #5a7d4a;
      --color-warning:   #c4943a;
      --color-danger:    #b8453a;
      --color-tag-upcoming:  #5a7d4a;
      --color-tag-active:    #c4943a;
      --color-tag-completed: #8b7355;
      --font-sans:   'Inter', -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      --font-serif:  'Noto Serif SC', 'STSong', 'SimSun', serif;
      --space-1: 8px;   --space-2: 16px;  --space-3: 24px;
      --space-4: 32px;  --space-5: 48px;  --space-6: 64px;
      --space-7: 80px;  --space-8: 96px;
      --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px;
      --shadow-card:    0 2px 8px rgba(44,36,22,0.06);
      --shadow-elevated: 0 4px 16px rgba(44,36,22,0.08);
    }

    /* ========================================
       Reset & Base
       ======================================== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body {
      font-family: var(--font-sans);
      background: var(--color-bg);
      color: var(--color-text);
      line-height: 1.7;
      min-height: 100vh;
    }
    a { color: var(--color-accent); text-decoration: none; transition: color 0.2s; }
    a:hover { color: var(--color-accent-h); }
    img { max-width: 100%; display: block; }
    button { cursor: pointer; font-family: inherit; }
    input, textarea, select { font-family: inherit; font-size: 0.95rem; }
    h1, h2, h3, h4 { font-family: var(--font-serif); line-height: 1.3; color: var(--color-text); }
    h1 { font-size: 2.5rem; font-weight: 700; }
    h2 { font-size: 1.8rem; font-weight: 600; }
    h3 { font-size: 1.3rem; font-weight: 600; }

    /* ========================================
       Layout
       ======================================== */
    .container { max-width: 1100px; margin: 0 auto; padding: 0 var(--space-3); }
    .section { padding: var(--space-6) 0; }

    /* Top Nav */
    #topnav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(250,248,245,0.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--color-border);
    }
    #topnav .container {
      display: flex; align-items: center; justify-content: space-between;
      height: 60px;
    }
    .nav-brand {
      font-family: var(--font-serif); font-size: 1.4rem; font-weight: 700;
      color: var(--color-accent); display: flex; align-items: center; gap: 8px;
    }
    .nav-brand i { width: 28px; height: 28px; stroke-width: 2; }
    .nav-links { display: flex; align-items: center; gap: var(--space-2); list-style: none; }
    .nav-links a {
      padding: 6px 14px; border-radius: var(--radius-sm);
      color: var(--color-text-2); font-weight: 500; font-size: 0.95rem;
      transition: all 0.2s;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--color-accent); background: var(--color-accent-bg); }
    .nav-user { display: flex; align-items: center; gap: var(--space-2); }
    .nav-user .avatar {
      width: 34px; height: 34px; border-radius: 50%; background: var(--color-accent-bg);
      display: flex; align-items: center; justify-content: center;
      font-weight: 600; font-size: 0.85rem; color: var(--color-accent);
      overflow: hidden;
    }
    .nav-user .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .hamburger { display: none; background: none; border: none; color: var(--color-text); padding: 4px; }

    /* Main */
    #view { min-height: calc(100vh - 60px - 120px); }

    /* Footer */
    footer {
      border-top: 1px solid var(--color-border); padding: var(--space-3) 0;
      text-align: center; color: var(--color-text-3); font-size: 0.85rem;
    }

    /* ========================================
       Component: Buttons
       ======================================== */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 10px 20px; border-radius: var(--radius-sm);
      font-weight: 600; font-size: 0.95rem; border: none;
      transition: all 0.2s ease-out;
    }
    .btn-primary { background: var(--color-accent); color: #fff; }
    .btn-primary:hover { background: var(--color-accent-h); }
    .btn-outline { background: transparent; color: var(--color-accent); border: 1.5px solid var(--color-accent); }
    .btn-outline:hover { background: var(--color-accent-bg); }
    .btn-ghost { background: transparent; color: var(--color-text-2); }
    .btn-ghost:hover { background: var(--color-bg-alt); }
    .btn-sm { padding: 6px 14px; font-size: 0.85rem; }
    .btn-lg { padding: 14px 28px; font-size: 1.05rem; }
    .btn-danger { background: transparent; color: var(--color-danger); border: 1.5px solid var(--color-danger); }
    .btn-danger:hover { background: #fdf0ed; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ========================================
       Component: Cards
       ======================================== */
    .card {
      background: var(--color-surface); border-radius: var(--radius-md);
      border: 1px solid var(--color-border); box-shadow: var(--shadow-card);
      overflow: hidden; transition: box-shadow 0.25s, transform 0.25s;
    }
    .card:hover { box-shadow: var(--shadow-elevated); }
    .card-clickable:hover { transform: translateY(-2px); }
    .card-body { padding: var(--space-3); }

    /* ========================================
       Component: Tags / Badges
       ======================================== */
    .tag {
      display: inline-block; padding: 3px 10px; border-radius: 20px;
      font-size: 0.78rem; font-weight: 600; letter-spacing: 0.01em;
    }
    .tag-upcoming { background: #e8f0e0; color: var(--color-tag-upcoming); }
    .tag-active    { background: #fdf0d5; color: var(--color-tag-active); }
    .tag-completed { background: #ede8e0; color: var(--color-tag-completed); }
    .tag-genre     { background: var(--color-accent-bg); color: var(--color-accent); }

    /* ========================================
       Component: Forms
       ======================================== */
    .form-group { margin-bottom: var(--space-3); }
    .form-group label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 0.9rem; color: var(--color-text-2); }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%; padding: 10px 14px; border: 1px solid var(--color-border);
      border-radius: var(--radius-sm); background: var(--color-surface);
      color: var(--color-text); transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
      outline: none; border-color: var(--color-accent); box-shadow: 0 0 0 3px var(--color-accent-bg);
    }
    .form-group textarea { min-height: 120px; resize: vertical; line-height: 1.6; }

    /* ========================================
       Component: Markdown Content
       ======================================== */
    .md-content { max-width: 65ch; }
    .md-content h2 { font-size: 1.5rem; margin: var(--space-4) 0 var(--space-2); }
    .md-content h3 { font-size: 1.2rem; margin: var(--space-3) 0 var(--space-1); }
    .md-content p { margin-bottom: var(--space-2); }
    .md-content ul, .md-content ol { margin-bottom: var(--space-2); padding-left: var(--space-3); }
    .md-content li { margin-bottom: var(--space-1); }
    .md-content table { width: 100%; border-collapse: collapse; margin: var(--space-3) 0; font-size: 0.9rem; }
    .md-content th, .md-content td { padding: 8px 12px; border: 1px solid var(--color-border); text-align: left; }
    .md-content th { background: var(--color-bg-alt); font-weight: 600; }
    .md-content blockquote {
      border-left: 3px solid var(--color-accent); padding-left: var(--space-2);
      color: var(--color-text-2); font-style: italic; margin: var(--space-2) 0;
    }
    .md-content img { max-width: 100%; border-radius: var(--radius-sm); margin: var(--space-2) 0; }
    .md-content a { color: var(--color-accent); text-decoration: underline; }

    /* ========================================
       Views: Shared
       ======================================== */
    .page-header {
      padding: var(--space-5) 0 var(--space-3);
      border-bottom: 1px solid var(--color-border); margin-bottom: var(--space-4);
    }
    .page-header h1 { margin-bottom: var(--space-1); }
    .page-header .subtitle { color: var(--color-text-2); font-size: 1.05rem; }

    /* Grid */
    .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--space-3); }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-3); }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--space-3); }

    /* Filters */
    .filters { display: flex; gap: var(--space-1); flex-wrap: wrap; margin-bottom: var(--space-3); }
    .filter-chip {
      padding: 6px 16px; border-radius: 20px; font-size: 0.85rem; font-weight: 500;
      border: 1.5px solid var(--color-border); background: var(--color-surface);
      color: var(--color-text-2); cursor: pointer; transition: all 0.2s;
    }
    .filter-chip:hover, .filter-chip.active { border-color: var(--color-accent); color: var(--color-accent); background: var(--color-accent-bg); }

    /* Empty State */
    .empty-state { text-align: center; padding: var(--space-7) var(--space-3); color: var(--color-text-3); }
    .empty-state i { width: 48px; height: 48px; stroke-width: 1.5; margin-bottom: var(--space-2); }

    /* Tabs */
    .tabs { display: flex; gap: 0; border-bottom: 2px solid var(--color-border); margin-bottom: var(--space-4); }
    .tab {
      padding: 10px 20px; font-weight: 600; font-size: 0.9rem; color: var(--color-text-2);
      border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent;
      margin-bottom: -2px; transition: all 0.2s;
    }
    .tab:hover { color: var(--color-accent); }
    .tab.active { color: var(--color-accent); border-bottom-color: var(--color-accent); }

    /* ========================================
       Calendar
       ======================================== */
    .calendar { width: 100%; max-width: 360px; }
    .calendar-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--space-2); }
    .calendar-header h4 { font-family: var(--font-sans); font-size: 1rem; }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; text-align: center; }
    .calendar-grid .day-name { font-size: 0.75rem; color: var(--color-text-3); padding: 6px 0; font-weight: 600; }
    .calendar-grid .day {
      aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
      border-radius: 50%; font-size: 0.85rem; font-weight: 500;
      transition: all 0.15s;
    }
    .calendar-grid .day.other-month { color: var(--color-border); }
    .calendar-grid .day.checked {
      background: var(--color-accent); color: #fff;
    }
    .calendar-grid .day.today:not(.checked) {
      border: 2px solid var(--color-accent); color: var(--color-accent);
    }
    .calendar-grid .day.future { color: var(--color-text-3); }

    /* ========================================
       Book Card
       ======================================== */
    .book-card { display: flex; flex-direction: column; }
    .book-card .cover {
      aspect-ratio: 3/4; background: var(--color-bg-alt);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-serif); font-size: 2rem; color: var(--color-text-3);
      position: relative; overflow: hidden;
    }
    .book-card .cover img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
    .book-card .cover .status-badge {
      position: absolute; top: 10px; right: 10px;
      padding: 4px 10px; border-radius: 12px; font-size: 0.72rem; font-weight: 700;
      font-family: var(--font-sans);
    }
    .book-card .card-body { flex: 1; display: flex; flex-direction: column; }
    .book-card .card-body h3 { font-size: 1.1rem; margin-bottom: 4px; }
    .book-card .card-body .author { color: var(--color-text-2); font-size: 0.85rem; margin-bottom: var(--space-1); }
    .book-card .card-body .meta { margin-top: auto; display: flex; gap: var(--space-1); flex-wrap: wrap; }

    /* Event Card */
    .event-card { display: flex; flex-direction: column; }
    .event-card .poster {
      aspect-ratio: 16/10; background: var(--color-bg-alt);
      display: flex; align-items: center; justify-content: center;
      color: var(--color-text-3); position: relative; overflow: hidden;
    }
    .event-card .poster img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
    .event-card .card-body h3 { font-size: 1.05rem; }
    .event-card .info-row { display: flex; align-items: center; gap: 6px; color: var(--color-text-2); font-size: 0.85rem; margin-top: 4px; }
    .event-card .info-row i { width: 16px; height: 16px; }

    /* ========================================
       Modal
       ======================================== */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(44,36,22,0.3); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      padding: var(--space-3);
    }
    .modal {
      background: var(--color-surface); border-radius: var(--radius-lg);
      box-shadow: 0 8px 32px rgba(44,36,22,0.12);
      width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto;
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: var(--space-3); border-bottom: 1px solid var(--color-border);
    }
    .modal-body { padding: var(--space-3); }
    .modal-header button { background: none; border: none; color: var(--color-text-3); padding: 4px; }

    /* ========================================
       Toast
       ======================================== */
    #toast-container {
      position: fixed; top: 72px; right: var(--space-3); z-index: 300;
      display: flex; flex-direction: column; gap: var(--space-1);
    }
    .toast {
      padding: 12px 20px; border-radius: var(--radius-sm);
      font-size: 0.9rem; font-weight: 500; box-shadow: var(--shadow-elevated);
      animation: slideIn 0.3s ease-out;
      max-width: 360px;
    }
    .toast-success { background: #e8f0e0; color: var(--color-success); }
    .toast-error { background: #fdf0ed; color: var(--color-danger); }
    @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

    /* ========================================
       Login / Register
       ======================================== */
    .auth-page { max-width: 420px; margin: var(--space-7) auto; }
    .auth-page .card { padding: var(--space-4); }
    .auth-page h2 { text-align: center; margin-bottom: var(--space-3); }
    .auth-page .alt-link { text-align: center; margin-top: var(--space-3); font-size: 0.9rem; color: var(--color-text-2); }

    /* ========================================
       Home Hero
       ======================================== */
    .hero {
      padding: var(--space-7) 0 var(--space-5);
      text-align: center;
    }
    .hero h1 { font-size: 2.8rem; margin-bottom: var(--space-2); }
    .hero .lead { font-size: 1.15rem; color: var(--color-text-2); max-width: 600px; margin: 0 auto; }
    .current-book-section { padding-bottom: var(--space-6); }
    .current-book-card {
      display: flex; gap: var(--space-4); align-items: flex-start;
      background: var(--color-surface); border-radius: var(--radius-lg);
      border: 1px solid var(--color-border); box-shadow: var(--shadow-card);
      padding: var(--space-4); max-width: 700px; margin: 0 auto;
    }
    .current-book-card .cover-slot {
      width: 130px; aspect-ratio: 3/4; border-radius: var(--radius-sm);
      background: var(--color-bg-alt); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-serif); font-size: 1.5rem; color: var(--color-text-3);
      position: relative; overflow: hidden;
    }
    .current-book-card .cover-slot img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
    .current-book-card .info { flex: 1; }
    .current-book-card .info h3 { font-size: 1.4rem; margin-bottom: 4px; }
    .current-book-card .info .author { color: var(--color-text-2); margin-bottom: 8px; }
    .current-book-card .info .period { font-size: 0.85rem; color: var(--color-text-3); margin-bottom: 12px; }

    /* ========================================
       Responsive
       ======================================== */
    @media (max-width: 768px) {
      :root { font-size: 15px; }
      h1 { font-size: 2rem; }
      h2 { font-size: 1.5rem; }
      .nav-links { display: none; }
      .nav-links.open {
        display: flex; flex-direction: column; position: absolute;
        top: 60px; left: 0; right: 0; background: var(--color-bg);
        border-bottom: 1px solid var(--color-border); padding: var(--space-2);
        box-shadow: var(--shadow-elevated);
      }
      .hamburger { display: block; }
      .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
      .current-book-card { flex-direction: column; align-items: center; text-align: center; }
      .current-book-card .cover-slot { width: 100px; }
      .hero h1 { font-size: 2.2rem; }
      .section { padding: var(--space-4) 0; }
    }

    @media (max-width: 375px) {
      .container { padding: 0 var(--space-2); }
      .hero h1 { font-size: 1.8rem; }
      .modal { max-width: 95vw; }
    }
  </style>
</head>
<body>
  <div id="app">
    <nav id="topnav">
      <div class="container">
        <a href="#/" class="nav-brand" onclick="event.preventDefault();router.navigate('/')">
          <i data-lucide="book-open"></i> 读书谈
        </a>
        <button class="hamburger" id="hamburger-btn" aria-label="菜单">
          <i data-lucide="menu"></i>
        </button>
        <ul class="nav-links" id="nav-links">
          <li><a href="#/" data-route="/">首页</a></li>
          <li><a href="#/books" data-route="/books">书库</a></li>
          <li><a href="#/events" data-route="/events">活动</a></li>
        </ul>
        <div class="nav-user" id="nav-user"></div>
      </div>
    </nav>
    <main id="view"></main>
    <footer>
      <div class="container">读书谈 · 一起读书，一起聊书</div>
    </footer>
  </div>
  <div id="toast-container"></div>
  <div id="modal-container"></div>

  <script type="module">
    // ===========================================
    // CONFIG — 替换为你的 Supabase 项目信息
    // ===========================================
    const SUPABASE_URL = 'YOUR_SUPABASE_URL';
    const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';

    // ===========================================
    // SUPABASE INIT
    // ===========================================
    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Configure marked
    marked.setOptions({ breaks: true, gfm: true });

    // ===========================================
    // STORE — Simple reactive state
    // ===========================================
    const store = {
      _state: {
        user: null, profile: null, isAdmin: false,
        books: [], events: [], config: {}
      },
      _listeners: {},
      get(k) { return this._state[k]; },
      set(k, v) {
        this._state[k] = v;
        (this._listeners[k] || []).forEach(fn => fn(v));
      },
      on(k, fn) {
        (this._listeners[k] = this._listeners[k] || []).push(fn);
      }
    };

    // ===========================================
    // TOAST
    // ===========================================
    function toast(msg, type = 'success') {
      const el = document.createElement('div');
      el.className = `toast toast-${type}`;
      el.textContent = msg;
      document.getElementById('toast-container').appendChild(el);
      setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity 0.3s'; setTimeout(() => el.remove(), 300); }, 3000);
    }

    // ===========================================
    // MODAL
    // ===========================================
    function showModal(title, contentHtml, onClose) {
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.innerHTML = `<div class="modal">
        <div class="modal-header"><h3>${title}</h3><button id="modal-close-btn"><i data-lucide="x"></i></button></div>
        <div class="modal-body">${contentHtml}</div>
      </div>`;
      document.getElementById('modal-container').appendChild(overlay);
      lucide.createIcons();
      overlay.querySelector('#modal-close-btn').onclick = () => { overlay.remove(); if (onClose) onClose(); };
      overlay.addEventListener('click', (e) => { if (e.target === overlay) { overlay.remove(); if (onClose) onClose(); } });
      return overlay;
    }

    // ===========================================
    // ROUTER
    // ===========================================
    const routes = {};
    function route(path, handler, opts = {}) { routes[path] = { handler, ...opts }; }

    const router = {
      navigate(path) { location.hash = '#' + path; },
      currentPath() { return location.hash.slice(1) || '/'; },
      match(path) {
        for (const [pattern, def] of Object.entries(routes)) {
          const keys = [];
          const regexStr = pattern.replace(/:(\w+)/g, (_, k) => { keys.push(k); return '([^/]+)'; });
          const match = path.match(new RegExp('^' + regexStr + '$'));
          if (match) {
            const params = {};
            keys.forEach((k, i) => params[k] = match[i + 1]);
            return { ...def, params };
          }
        }
        return null;
      },
      async render() {
        const path = this.currentPath();
        const matched = this.match(path);

        // Auth guard
        const authRequired = ['/profile', '/profile/edit', '/admin'].some(p => path.startsWith(p));
        if (authRequired && !store.get('user')) {
          return this.navigate('/login?redirect=' + encodeURIComponent(path));
        }

        // Admin guard
        if (path.startsWith('/admin') && !store.get('isAdmin')) {
          document.getElementById('view').innerHTML = '<div class="container section"><div class="empty-state"><i data-lucide="shield-alert"></i><p>您没有管理权限</p></div></div>';
          lucide.createIcons();
          return;
        }

        if (matched) {
          document.getElementById('view').innerHTML = await matched.handler(matched.params);
        } else {
          document.getElementById('view').innerHTML = '<div class="container section"><div class="empty-state"><i data-lucide="file-question"></i><p>页面未找到</p></div></div>';
        }
        lucide.createIcons();
        this.updateNav(path);
        bindGlobalEvents();
      },
      updateNav(path) {
        document.querySelectorAll('#nav-links a').forEach(a => {
          a.classList.toggle('active', a.dataset.route && path.startsWith(a.dataset.route));
        });
      }
    };

      if (hamburger && navLinks) {

    async function getTodayCheckin() {
      const user = store.get('user');
      if (!user) return false;
      const today = dayjs().format('YYYY-MM-DD');
      const { data } = await sb.from('daily_checkins').select('*').eq('user_id', user.id).eq('checkin_date', today).maybeSingle();
      return !!data;
    }

    async function getMonthCheckins(year, month) {
      const user = store.get('user');
      if (!user) return [];
      const start = dayjs(`${year}-${String(month).padStart(2,'0')}-01`).format('YYYY-MM-DD');
      const end = dayjs(start).endOf('month').format('YYYY-MM-DD');
      const { data } = await sb.from('daily_checkins').select('checkin_date').eq('user_id', user.id).gte('checkin_date', start).lte('checkin_date', end);
      return (data || []).map(r => r.checkin_date);
    }

    async function doCheckin() {
      const user = store.get('user');
      if (!user) { toast('请先登录', 'error'); return; }
      const today = dayjs().format('YYYY-MM-DD');
      const { error } = await sb.from('daily_checkins').insert({ user_id: user.id, checkin_date: today });
      if (error) {
        if (error.code === '23505') { toast('今天已经签到过了', 'error'); }
        else { toast('签到失败：' + error.message, 'error'); }
      } else {

    route('/profile', async () => {
      const profile = store.get('profile');
      if (!profile) return '<div class="container section"><div class="empty-state"><i data-lucide="loader"></i><p>加载中...</p></div></div>';

      const now = dayjs();
      const [year, month] = [now.year(), now.month() + 1];
      const checkins = await getMonthCheckins(year, month);
      const checkedToday = await getTodayCheckin();

      // Build calendar
      const firstDay = dayjs(`${year}-${String(month).padStart(2,'0')}-01`);
      const daysInMonth = firstDay.daysInMonth();
      const startDayOfWeek = firstDay.day(); // 0=Sun
      const prevMonthDays = firstDay.subtract(1, 'day').daysInMonth();

      let calCells = '';
      // Day names
      ['日','一','二','三','四','五','六'].forEach(d => { calCells += `<div class="day-name">${d}</div>`; });
      // Prev month
      for (let i = startDayOfWeek - 1; i >= 0; i--) {
        calCells += `<div class="day other-month">${prevMonthDays - i}</div>`;
      }
      // Current month
      const todayStr = now.format('YYYY-MM-DD');
      for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = dayjs(`${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`).format('YYYY-MM-DD');
        let cls = 'day';
        if (checkins.includes(dateStr)) cls += ' checked';
        else if (dateStr === todayStr) cls += ' today';
        else if (dayjs(dateStr).isAfter(now, 'day')) cls += ' future';
        calCells += `<div class="${cls}">${d}</div>`;
      }
      // Next month to fill row
      const totalCells = startDayOfWeek + daysInMonth;
      const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
      for (let d = 1; d <= remaining; d++) {
        calCells += `<div class="day other-month">${d}</div>`;
      }

      return `
        <div class="container section">
          <div style="display:flex;gap:var(--space-4);flex-wrap:wrap;align-items:flex-start;">
            <div style="width:100%;max-width:320px;">

                  ${profile.city ? `<div style="font-size:0.85rem;color:var(--color-text-3);"><i data-lucide="map-pin" style="width:14px;height:14px;display:inline;vertical-align:-2px;"></i> ${profile.city}</div>` : ''}
                  <a href="#/profile/edit" class="btn btn-outline btn-sm" style="margin-top:var(--space-2);">编辑资料</a>

        <form id="book-edit-form" style="max-height:70vh;overflow-y:auto;">

              <option value="active" ${book.status === 'active' ? 'selected' : ''}>正在共读</option>

          <div class="form-group"><label>领读人介绍（Markdown）</label><textarea name="host_intro" style="min-height:80px;">${book.host_intro || ''}</textarea></div>
          <div class="form-group"><label>线上活动（JSON）</label><textarea name="online_activities" style="min-height:100px;font-family:monospace;font-size:0.8rem;">${typeof book.online_activities === 'string' ? book.online_activities : JSON.stringify(book.online_activities, null, 2)}</textarea></div>
          <div class="form-group"><label>会议回放（JSON）</label><textarea name="meeting_replays" style="min-height:80px;font-family:monospace;font-size:0.8rem;">${typeof book.meeting_replays === 'string' ? book.meeting_replays : JSON.stringify(book.meeting_replays, null, 2)}</textarea></div>

          <input type="hidden" name="book_id" value="${book.id || ''}">
        </form>`;
      const modal = showModal(isEdit ? '编辑书籍' : '添加书籍', formHtml, () => {

      function bookFormHandler(e) {
        if (e.target.id !== 'book-edit-form') return;
        e.preventDefault();
        const fd = new FormData(e.target);
        const data = Object.fromEntries(fd.entries());
        // Parse JSON fields

        modal.remove();
        document.removeEventListener('submit', bookFormHandler);
      }

    async function saveBook(data, id) {

      let error;
      if (id) {
        ({ error } = await sb.from('books').update(payload).eq('id', id));
      } else {
        ({ error } = await sb.from('books').insert(payload));
      }
      if (error) { toast('保存失败：' + error.message, 'error'); return; }
      toast(id ? '书籍已更新' : '书籍已添加');
      router.render();
    }

    // Admin: add/edit event form
    function showEventForm(eventData = null) {
      const isEdit = !!eventData;
      const ev = eventData || { title:'', poster_url:'', location:'', event_date:'', guests:'', price:'', description:'', status:'upcoming' };
      const formHtml = `
        <form id="event-edit-form">
          <div class="form-group"><label>活动名称 *</label><input type="text" name="title" value="${ev.title}" required></div>
          <div class="form-group"><label>海报图 URL</label><input type="url" name="poster_url" value="${ev.poster_url || ''}"></div>
          <div class="form-group"><label>地点</label><input type="text" name="location" value="${ev.location || ''}"></div>
          <div class="form-group"><label>时间</label><input type="datetime-local" name="event_date" value="${ev.event_date ? dayjs(ev.event_date).format('YYYY-MM-DDTHH:mm') : ''}"></div>
          <div class="form-group"><label>嘉宾</label><input type="text" name="guests" value="${ev.guests || ''}"></div>
          <div class="form-group"><label>价格</label><input type="text" name="price" value="${ev.price || ''}" placeholder="免费 / ¥68"></div>
          <div class="form-group"><label>状态</label><select name="status">
            <option value="upcoming" ${ev.status === 'upcoming' ? 'selected' : ''}>即将开始</option>
            <option value="ongoing" ${ev.status === 'ongoing' ? 'selected' : ''}>进行中</option>
            <option value="ended" ${ev.status === 'ended' ? 'selected' : ''}>已结束</option>
            <option value="cancelled" ${ev.status === 'cancelled' ? 'selected' : ''}>已取消</option>
          </select></div>
          <div class="form-group"><label>活动简介（Markdown）</label><textarea name="description" style="min-height:100px;">${ev.description || ''}</textarea></div>
          <button type="submit" class="btn btn-primary">${isEdit ? '保存修改' : '添加活动'}</button>
          <input type="hidden" name="event_id" value="${ev.id || ''}">
        </form>`;
      const modal = showModal(isEdit ? '编辑活动' : '添加活动', formHtml, () => {
        document.removeEventListener('submit', eventFormHandler);
      });
      document.addEventListener('submit', eventFormHandler);
      function eventFormHandler(e) {
        if (e.target.id !== 'event-edit-form') return;
        e.preventDefault();
        const fd = new FormData(e.target);
        const data = Object.fromEntries(fd.entries());
        saveEvent(data, data.event_id);
        modal.remove();
        document.removeEventListener('submit', eventFormHandler);
      }
    }

    async function saveEvent(data, id) {
      const payload = { ...data };
      delete payload.event_id;
      payload.updated_at = new Date().toISOString();
      if (!id) payload.created_by = store.get('user').id;

      let error;
      if (id) {
        ({ error } = await sb.from('events').update(payload).eq('id', id));
      } else {
        ({ error } = await sb.from('events').insert(payload));
      }
      if (error) { toast('保存失败：' + error.message, 'error'); return; }
      toast(id ? '活动已更新' : '活动已添加');
      router.render();
    }

    async function deleteEvent(id) {
      if (!confirm('确定要删除这个活动吗？')) return;
      const { error } = await sb.from('events').delete().eq('id', id);
      if (error) { toast('删除失败：' + error.message, 'error'); return; }
      toast('活动已删除');
      router.render();
    }

    // Admin button handlers
    document.addEventListener('click', (e) => {
      const addBookBtn = e.target.closest('#btn-add-book, #btn-add-book2');
      if (addBookBtn) { showBookForm(); return; }
      const addEventBtn = e.target.closest('#btn-add-event');
      if (addEventBtn) { showEventForm(); return; }
      const editBookBtn = e.target.closest('.btn-edit-book');
      if (editBookBtn) {
        const id = editBookBtn.dataset.id;
        const book = store.get('books').find(b => String(b.id) === id);
        if (book) showBookForm(book);
        return;
      }
      const delBookBtn = e.target.closest('.btn-del-book');
      if (delBookBtn) { deleteBook(delBookBtn.dataset.id); return; }
      const editEventBtn = e.target.closest('.btn-edit-event');
      if (editEventBtn) {
        const id = editEventBtn.dataset.id;
        const event = store.get('events').find(ev => String(ev.id) === id);
        if (event) showEventForm(event);
        return;
      }
      const delEventBtn = e.target.closest('.btn-del-event');
      if (delEventBtn) { deleteEvent(delEventBtn.dataset.id); return; }
    });

    // ===========================================
    // INIT
    // ===========================================
    async function init() {
      await initAuth();
    }

    init().catch(err => console.error('Init error:', err));
  </script>
</body>
</html>
