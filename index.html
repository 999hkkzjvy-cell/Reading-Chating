<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>以读攻独 · 共读资源站</title>
  <meta property="og:title" content="以读攻独 · 共读资源站">
  <meta property="og:description" content="用阅读抵御孤独，遇见同频的书友。有深度、有温度的线上共读社群。">
  <meta property="og:type" content="website">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
  <style>
    /* ========================================
       Design Tokens — 以读攻独 · Refined Literary
       ======================================== */
    :root {
      --color-bg:        #fbf9f6;
      --color-bg-alt:    #f3efe8;
      --color-surface:   #ffffff;
      --color-text:      #2d2422;
      --color-text-2:    #6e6258;
      --color-text-3:    #a09588;
      --color-accent:    #c17d4b;
      --color-accent-h:  #a46533;
      --color-accent-l:  #d9a87a;
      --color-accent-bg: #fef7f1;
      --color-border:    rgba(0,0,0,0.06);
      --color-success:   #6b9070;
      --color-warning:   #d4a843;
      --color-danger:    #c4665a;
      --color-tag-upcoming:  #6b9070;
      --color-tag-active:    #d4a843;
      --color-tag-completed: #8b7b6b;
      --font-sans:   'Inter', -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      --font-serif:  'Noto Serif SC', 'STSong', 'SimSun', serif;
      --space-1: 8px;   --space-2: 16px;  --space-3: 24px;
      --space-4: 32px;  --space-5: 48px;  --space-6: 64px;
      --space-7: 80px;  --space-8: 96px;
      --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
      --shadow-md: 0 2px 12px rgba(0,0,0,0.05);
      --shadow-lg: 0 8px 30px rgba(0,0,0,0.07);
    }

    /* ========================================
       Reset & Base
       ======================================== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body {
      font-family: var(--font-sans);
      background: var(--color-bg);
      color: var(--color-text);
      line-height: 1.7;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    a { color: var(--color-accent); text-decoration: none; transition: color 0.2s ease; }
    a:hover { color: var(--color-accent-h); }
    img { max-width: 100%; display: block; }
    button { cursor: pointer; font-family: inherit; }
    input, textarea, select { font-family: inherit; font-size: 0.95rem; }
    h1, h2, h3, h4 { font-family: var(--font-serif); line-height: 1.35; color: var(--color-text); }
    h1 { font-size: 2.5rem; font-weight: 700; letter-spacing: 0.02em; }
    h2 { font-size: 1.7rem; font-weight: 600; }
    h3 { font-size: 1.25rem; font-weight: 600; }

    /* ========================================
       Layout
       ======================================== */
    .container { max-width: 1080px; margin: 0 auto; padding: 0 var(--space-3); }
    .section { padding: var(--space-7) 0; }

    /* Top Nav — NatGeo-inspired with accent line */
    #topnav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(251,249,246,0.85); backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }
    .nav-accent-line { height: 2px; background: var(--color-accent); }
    #topnav .container {
      display: flex; align-items: center; justify-content: space-between;
      height: 64px;
    }
    .nav-left {
      display: flex; align-items: center; gap: var(--space-3);
    }
    .nav-brand {
      font-family: var(--font-serif); font-size: 1.35rem; font-weight: 700;
      color: var(--color-accent); display: flex; align-items: center; gap: 7px;
      letter-spacing: 0.04em; flex-shrink: 0;
    }
    .nav-brand i { width: 26px; height: 26px; stroke-width: 2; }
    .nav-links { display: flex; align-items: center; gap: 4px; list-style: none; }
    .nav-links a {
      padding: 6px 14px; border-radius: var(--radius-sm);
      color: var(--color-text-2); font-weight: 500; font-size: 0.9rem;
      transition: all 0.2s ease;
    }
    .nav-links a:hover, .nav-links a.active {
      color: var(--color-accent); background: var(--color-accent-bg);
    }
    .nav-right {
      display: flex; align-items: center; gap: var(--space-2);
    }
    .nav-user { display: flex; align-items: center; gap: var(--space-2); }
    .nav-user .avatar {
      width: 34px; height: 34px; border-radius: 50%; background: var(--color-accent-bg);
      display: flex; align-items: center; justify-content: center;
      font-weight: 600; font-size: 0.85rem; color: var(--color-accent);
      overflow: hidden;
    }
    .nav-user .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .hamburger { display: none; background: none; border: none; color: var(--color-text); padding: 4px; }

    /* Main */
    #view { min-height: calc(100vh - 66px - 100px); }

    /* Footer */
    footer {
      border-top: 1px solid var(--color-border); padding: var(--space-4) 0;
      text-align: center; color: var(--color-text-3); font-size: 0.85rem;
      letter-spacing: 0.02em;
    }

    /* ========================================
       Component: Buttons
       ======================================== */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 10px 20px; border-radius: var(--radius-sm);
      font-weight: 600; font-size: 0.9rem; border: none;
      transition: all 0.2s ease; letter-spacing: 0.01em;
    }
    .btn-primary {
      background: var(--color-accent); color: #fff;
      box-shadow: 0 2px 8px rgba(193,125,75,0.22);
    }
    .btn-primary:hover {
      background: var(--color-accent-h);
      box-shadow: 0 4px 14px rgba(193,125,75,0.32);
      transform: translateY(-1px);
    }
    .btn-outline {
      background: transparent; color: var(--color-accent);
      border: 1.5px solid var(--color-accent);
    }
    .btn-outline:hover { background: var(--color-accent-bg); }
    .btn-ghost { background: transparent; color: var(--color-text-2); }
    .btn-ghost:hover { background: var(--color-bg-alt); }
    .btn-sm { padding: 6px 14px; font-size: 0.82rem; }
    .btn-lg { padding: 14px 30px; font-size: 1rem; }
    .btn-danger {
      background: transparent; color: var(--color-danger);
      border: 1.5px solid var(--color-danger);
    }
    .btn-danger:hover { background: #fef5f4; }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ========================================
       Component: Cards
       ======================================== */
    .card {
      background: var(--color-surface); border-radius: var(--radius-md);
      border: 1px solid var(--color-border); box-shadow: var(--shadow-sm);
      overflow: hidden; transition: box-shadow 0.3s ease, transform 0.3s ease;
    }
    .card:hover { box-shadow: var(--shadow-md); }
    .card-clickable:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
    .card-body { padding: var(--space-3); }

    /* ========================================
       Component: Tags / Badges
       ======================================== */
    .tag {
      display: inline-block; padding: 3px 10px; border-radius: 20px;
      font-size: 0.75rem; font-weight: 600; letter-spacing: 0.02em;
    }
    .tag-upcoming { background: #e8efe5; color: var(--color-tag-upcoming); }
    .tag-active    { background: #fdf3dc; color: var(--color-tag-active); }
    .tag-completed { background: #eee9e2; color: var(--color-tag-completed); }
    .tag-genre     { background: var(--color-accent-bg); color: var(--color-accent); }

    /* ========================================
       Component: Forms
       ======================================== */
    .form-group { margin-bottom: var(--space-3); }
    .form-group label {
      display: block; margin-bottom: 6px; font-weight: 600;
      font-size: 0.88rem; color: var(--color-text-2);
    }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%; padding: 10px 14px; border: 1px solid var(--color-border);
      border-radius: var(--radius-sm); background: var(--color-surface);
      color: var(--color-text); transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
      outline: none; border-color: var(--color-accent);
      box-shadow: 0 0 0 3px rgba(193,125,75,0.1);
    }
    .form-group textarea { min-height: 120px; resize: vertical; line-height: 1.6; }

    /* ========================================
       Component: Markdown Content
       ======================================== */
    .md-content { max-width: 65ch; }
    .md-content h2 { font-size: 1.45rem; margin: var(--space-4) 0 var(--space-2); }
    .md-content h3 { font-size: 1.15rem; margin: var(--space-3) 0 var(--space-1); }
    .md-content p { margin-bottom: var(--space-2); line-height: 1.8; }
    .md-content ul, .md-content ol { margin-bottom: var(--space-2); padding-left: var(--space-3); }
    .md-content li { margin-bottom: var(--space-1); }
    .md-content table { width: 100%; border-collapse: collapse; margin: var(--space-3) 0; font-size: 0.9rem; }
    .md-content th, .md-content td { padding: 10px 14px; border: 1px solid var(--color-border); text-align: left; }
    .md-content th { background: var(--color-bg-alt); font-weight: 600; }
    .md-content blockquote {
      border-left: 3px solid var(--color-accent-l); padding-left: var(--space-2);
      color: var(--color-text-2); margin: var(--space-2) 0;
    }
    .md-content img { max-width: 100%; border-radius: var(--radius-sm); margin: var(--space-2) 0; }
    .md-content a { color: var(--color-accent); text-decoration: underline; }

    /* ========================================
       Views: Shared
       ======================================== */
    .page-header {
      padding: var(--space-5) 0 var(--space-3);
      border-bottom: 1px solid var(--color-border); margin-bottom: var(--space-4);
    }
    .page-header h1 { margin-bottom: var(--space-1); }
    .page-header .subtitle { color: var(--color-text-2); font-size: 1rem; }

    /* Grid */
    .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--space-3); }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-3); }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--space-3); }

    /* Filters */
    .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: var(--space-3); }
    .filter-chip {
      padding: 7px 18px; border-radius: 20px; font-size: 0.85rem; font-weight: 500;
      border: 1px solid var(--color-border); background: var(--color-surface);
      color: var(--color-text-2); cursor: pointer; transition: all 0.2s ease;
    }
    .filter-chip:hover, .filter-chip.active {
      border-color: var(--color-accent); color: var(--color-accent);
      background: var(--color-accent-bg);
    }

    /* Empty State */
    .empty-state {
      text-align: center; padding: var(--space-8) var(--space-3);
      color: var(--color-text-3);
    }
    .empty-state i { width: 48px; height: 48px; stroke-width: 1.5; margin-bottom: var(--space-2); opacity: 0.5; }

    /* Tabs */
    .tabs { display: flex; gap: 0; border-bottom: 2px solid var(--color-border); margin-bottom: var(--space-4); }
    .tab {
      padding: 10px 20px; font-weight: 600; font-size: 0.9rem; color: var(--color-text-2);
      border: none; background: none; cursor: pointer;
      border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s ease;
    }
    .tab:hover { color: var(--color-accent); }
    .tab.active { color: var(--color-accent); border-bottom-color: var(--color-accent); }

    /* ========================================
       Calendar
       ======================================== */
    .calendar { width: 100%; max-width: 380px; margin: 0 auto; }
    .calendar-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: var(--space-2);
    }
    .calendar-header h4 { font-family: var(--font-sans); font-size: 1rem; font-weight: 600; }
    .calendar-grid {
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
      text-align: center; margin: 0 auto;
    }
    .calendar-grid .day-name {
      font-size: 0.75rem; color: var(--color-text-3); padding: 8px 0;
      font-weight: 600; letter-spacing: 0.02em;
    }
    .calendar-grid .day {
      aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
      border-radius: 6px; font-size: 0.88rem; font-weight: 500;
      transition: all 0.15s ease;
      position: relative;
    }
    .calendar-grid .day.other-month { color: #d8d3cb; }
    /* Today: square border highlight */
    .calendar-grid .day.today {
      border: 2.5px solid var(--color-accent);
      color: var(--color-accent); font-weight: 700;
    }
    .calendar-grid .day.future { color: var(--color-text-3); }
    /* Checked: large mood-color circle wrapping the number */
    .calendar-grid .day.checked {
      cursor: pointer;
    }
    .calendar-grid .day.checked::after {
      content: '';
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 75%; height: 75%;
      border-radius: 50%;
      background: var(--mood-dot, var(--color-accent));
      z-index: 0;
    }
    .calendar-grid .day.checked span {
      position: relative; z-index: 1;
      color: #fff; font-weight: 600;
    }
    .calendar-grid .day.checked:hover::after {
      transform: translate(-50%, -50%) scale(1.12);
    }
    .calendar-grid .day.checked:hover {
      box-shadow: var(--shadow-sm);
    }

    /* Mood color swatches */
    .mood-swatches {
      display: flex; gap: 8px; flex-wrap: wrap; margin-top: 2px;
    }
    .mood-swatch {
      width: 32px; height: 32px; border-radius: 50%;
      border: 2px solid var(--color-border); cursor: pointer;
      transition: all 0.2s ease; position: relative;
    }
    .mood-swatch:hover { transform: scale(1.15); }
    .mood-swatch.selected {
      border-color: var(--color-text);
      box-shadow: 0 0 0 3px rgba(0,0,0,0.08);
    }
    .mood-swatch.none {
      background: transparent;
      border: 2px dashed var(--color-border);
    }
    .mood-swatch.none::after {
      content: '';
      position: absolute; top: 50%; left: 50%;
      width: 14px; height: 1.5px;
      background: var(--color-text-3);
      transform: translate(-50%, -50%) rotate(-45deg);
    }

    /* Checkin detail in modal */
    .checkin-detail-head {
      text-align: center; margin-bottom: var(--space-3);
    }
    .checkin-detail-head .mood-dot {
      display: inline-block; width: 14px; height: 14px; border-radius: 50%;
      vertical-align: middle; margin-right: 6px;
      border: 2px solid var(--color-border);
    }
    .checkin-detail-book {
      margin-bottom: var(--space-2); padding: 8px 0;
      border-bottom: 1px solid var(--color-border);
    }
    .checkin-excerpt blockquote {
      border-left: 3px solid var(--color-accent-l);
      padding-left: var(--space-2);
      color: var(--color-text-2);
      font-family: var(--font-serif);
      font-style: italic; margin: 4px 0;
      line-height: 1.8; white-space: pre-wrap;
    }
    .checkin-reflection p {
      color: var(--color-text-2);
      line-height: 1.8; white-space: pre-wrap;
    }

    /* ========================================
       Book Card
       ======================================== */
    .book-card { display: flex; flex-direction: column; }
    .book-card .cover {
      aspect-ratio: 3/4; background: var(--color-bg-alt);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-serif); font-size: 2rem; color: var(--color-text-3);
      position: relative; overflow: hidden;
    }
    .book-card .cover img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
    .book-card .cover .status-badge {
      position: absolute; top: 8px; right: 8px;
      padding: 4px 10px; border-radius: 12px; font-size: 0.7rem; font-weight: 700;
      font-family: var(--font-sans); backdrop-filter: blur(4px);
    }
    .book-card .card-body { flex: 1; display: flex; flex-direction: column; }
    .book-card .card-body h3 { font-size: 1.05rem; margin-bottom: 6px; }
    .book-card .card-body .book-meta { font-size: 0.82rem; color: var(--color-text-2); margin-bottom: 3px; }
    .book-card .card-body .book-meta.muted { color: var(--color-text-3); }
    .book-card .card-body .meta { margin-top: auto; display: flex; gap: 6px; flex-wrap: wrap; }

    /* Event Card */
    .event-card { display: flex; flex-direction: column; }
    .event-card .poster {
      aspect-ratio: 16/10; background: var(--color-bg-alt);
      display: flex; align-items: center; justify-content: center;
      color: var(--color-text-3); position: relative; overflow: hidden;
    }
    .event-card .poster img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
    .event-card .card-body h3 { font-size: 1rem; }
    .event-card .info-row {
      display: flex; align-items: center; gap: 6px;
      color: var(--color-text-2); font-size: 0.85rem; margin-top: 5px;
    }
    .event-card .info-row i { width: 15px; height: 15px; }

    /* ========================================
       Visual Form Builder — JSONB fields
       ======================================== */
    .builder-section { margin-bottom: var(--space-3); }
    .builder-section > label {
      display: block; margin-bottom: 6px; font-weight: 600;
      font-size: 0.88rem; color: var(--color-text-2);
    }
    .builder-items { display: flex; flex-direction: column; gap: var(--space-1); }
    .builder-item {
      background: var(--color-bg); border-radius: var(--radius-sm);
      padding: var(--space-2); border: 1px solid var(--color-border);
    }
    .builder-item .b-row {
      display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; align-items: center;
    }
    .builder-item .b-row:last-child { margin-bottom: 0; }
    .builder-item input, .builder-item select {
      padding: 6px 10px; border: 1px solid var(--color-border);
      border-radius: 6px; font-size: 0.82rem; background: var(--color-surface);
      color: var(--color-text); flex: 1; min-width: 80px; font-family: inherit;
    }
    .builder-item input:focus, .builder-item select:focus {
      outline: none; border-color: var(--color-accent);
    }
    .builder-item .btn-remove-row {
      background: none; border: none; color: var(--color-text-3);
      cursor: pointer; padding: 2px 6px; border-radius: 4px; flex-shrink: 0;
      font-size: 1rem; line-height: 1;
    }
    .builder-item .btn-remove-row:hover { color: var(--color-danger); background: #fef5f4; }
    .btn-add-row {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 5px 14px; margin-top: 4px; border-radius: var(--radius-sm);
      font-size: 0.82rem; font-weight: 500; font-family: inherit;
      border: 1px dashed var(--color-border); background: transparent;
      color: var(--color-text-2); cursor: pointer; transition: all 0.2s;
    }
    .btn-add-row:hover { border-color: var(--color-accent); color: var(--color-accent); }
    .res-section { margin-bottom: var(--space-3); }
    .res-section h5 {
      font-size: 0.85rem; font-weight: 600; margin-bottom: 4px;
      color: var(--color-text-2);
    }

    /* ========================================
       Modal
       ======================================== */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(30,25,20,0.25); backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      padding: var(--space-3);
    }
    .modal {
      background: var(--color-surface); border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg); width: 100%; max-width: 500px;
      max-height: 90vh; overflow-y: auto;
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: var(--space-3); border-bottom: 1px solid var(--color-border);
    }
    .modal-body { padding: var(--space-3); }
    .modal-header button { background: none; border: none; color: var(--color-text-3); padding: 4px; border-radius: 6px; }
    .modal-header button:hover { background: var(--color-bg-alt); color: var(--color-text); }

    /* ========================================
       Toast
       ======================================== */
    #toast-container {
      position: fixed; top: 76px; right: var(--space-3); z-index: 300;
      display: flex; flex-direction: column; gap: var(--space-1);
    }
    .toast {
      padding: 12px 20px; border-radius: var(--radius-sm);
      font-size: 0.88rem; font-weight: 500; box-shadow: var(--shadow-lg);
      animation: toastIn 0.3s ease-out; max-width: 360px;
    }
    .toast-success { background: #e8efe5; color: var(--color-success); }
    .toast-error { background: #fef5f4; color: var(--color-danger); }
    @keyframes toastIn { from { opacity: 0; transform: translateX(16px); } to { opacity: 1; transform: translateX(0); } }

    /* ========================================
       Login / Register
       ======================================== */
    .auth-page { max-width: 420px; margin: var(--space-8) auto; }
    .auth-page .card { padding: var(--space-4); }
    .auth-page h2 { text-align: center; margin-bottom: var(--space-3); }
    .auth-page .alt-link {
      text-align: center; margin-top: var(--space-3);
      font-size: 0.9rem; color: var(--color-text-2);
    }

    /* ========================================
       Home Hero
       ======================================== */
    .hero {
      padding: var(--space-8) 0 var(--space-4);
      text-align: center;
    }
    .hero h1 {
      font-size: 3rem; margin-bottom: var(--space-2);
      font-family: var(--font-serif); letter-spacing: 0.05em;
    }

<body>
  <div id="app">
    <nav id="topnav">
      <div class="container">
        <div class="nav-left">

  <div id="toast-container"></div>

  <script type="module">
    // ===========================================
    // CONFIG — 替换为你的 Supabase 项目信息
    // ===========================================
    const SUPABASE_URL = 'https://zugadhgezmqrnlwogomw.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1Z2FkaGdlem1xcm5sd29nb213Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1ODg2OTEsImV4cCI6MjA5NzE2NDY5MX0.RMQRipS4lcNnrRFWoRU_X0rR6HD6LtXwbeyFpXx3ajY';

    // ===========================================
    // SUPABASE INIT
    // ===========================================
    if (typeof supabase === 'undefined') { console.error('Supabase CDN 加载失败'); }
    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Configure marked
    if (typeof marked !== 'undefined') {
      marked.setOptions({ breaks: true, gfm: true });
    }

    // ===========================================
    // STORE — Simple reactive state
    // ===========================================
    const store = {
      _state: {
        user: null, profile: null, isAdmin: false,
        books: [], events: [], config: {}
      },
      _listeners: {},
      get(k) { return this._state[k]; },
      set(k, v) {
        this._state[k] = v;
        (this._listeners[k] || []).forEach(fn => fn(v));
      },
      on(k, fn) {
        (this._listeners[k] = this._listeners[k] || []).push(fn);
      }
    };

    // Calendar navigation state (lazy init)
    let calYear = null;
    let calMonth = null;
    let calCheckinsData = [];

    function ensureCalState() {
      if (calYear === null) {
        calYear = dayjs().year();
        calMonth = dayjs().month() + 1;
      }
    }

    // ===========================================
    // TOAST
    // ===========================================
    function toast(msg, type = 'success') {
      const el = document.createElement('div');
      el.className = `toast toast-${type}`;
      el.textContent = msg;
      document.getElementById('toast-container').appendChild(el);
      setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity 0.3s'; setTimeout(() => el.remove(), 300); }, 3000);
    }

    // ===========================================
    // MODAL
    // ===========================================
    function showModal(title, contentHtml, onClose) {
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.innerHTML = `<div class="modal">
        <div class="modal-header"><h3>${title}</h3><button id="modal-close-btn"><i data-lucide="x"></i></button></div>
        <div class="modal-body">${contentHtml}</div>
      </div>`;
      document.getElementById('modal-container').appendChild(overlay);
      lucide.createIcons();
      overlay.querySelector('#modal-close-btn').onclick = () => { overlay.remove(); if (onClose) onClose(); };
      overlay.addEventListener('click', (e) => { if (e.target === overlay) { overlay.remove(); if (onClose) onClose(); } });
      return overlay;
    }

    // ===========================================
    // ROUTER
    // ===========================================
    const routes = {};
    function route(path, handler, opts = {}) { routes[path] = { handler, ...opts }; }

    const router = {
      navigate(path) { location.hash = '#' + path; },
      currentPath() { return location.hash.slice(1) || '/'; },
      match(path) {
        for (const [pattern, def] of Object.entries(routes)) {
          const keys = [];
          const regexStr = pattern.replace(/:(\w+)/g, (_, k) => { keys.push(k); return '([^/]+)'; });
          const match = path.match(new RegExp('^' + regexStr + '$'));
          if (match) {
            const params = {};
            keys.forEach((k, i) => params[k] = match[i + 1]);
            return { ...def, params };
          }
        }
        return null;
      },
      async render() {
        try {
        const path = this.currentPath();
        const matched = this.match(path);

        // Auth guard
        const authRequired = ['/profile', '/profile/edit', '/admin'].some(p => path.startsWith(p));
        if (authRequired && !store.get('user')) {
          return this.navigate('/login?redirect=' + encodeURIComponent(path));
        }

        // Admin guard
        if (path.startsWith('/admin') && !store.get('isAdmin')) {
          document.getElementById('view').innerHTML = '<div class="container section"><div class="empty-state"><i data-lucide="shield-alert"></i><p>您没有管理权限</p></div></div>';
          lucide.createIcons();
          return;
        }

        if (matched) {
          document.getElementById('view').innerHTML = await matched.handler(matched.params);
        } else {
          document.getElementById('view').innerHTML = '<div class="container section"><div class="empty-state"><i data-lucide="file-question"></i><p>页面未找到</p></div></div>';
        }
        lucide.createIcons();
        this.updateNav(path);
        bindGlobalEvents();
        } catch (err) {
          console.error('Router error:', err);
          document.getElementById('view').innerHTML = '<div class="container section"><div class="empty-state"><i data-lucide="alert-triangle"></i><p>加载失败：' + err.message + '</p><p style="font-size:0.85rem;color:var(--color-text-3);">请检查网络连接或刷新重试</p></div></div>';
          lucide.createIcons();
        }
      },
      updateNav(path) {
        document.querySelectorAll('#nav-links a').forEach(a => {
          a.classList.toggle('active', a.dataset.route && path.startsWith(a.dataset.route));
        });
      }
    };

    // ===========================================
    // EVENT BINDING (delegation for dynamic content)
    // ===========================================
    function bindGlobalEvents() {
      // Hamburger
      const hamburger = document.getElementById('hamburger-btn');
      const navLinks = document.getElementById('nav-links');
      if (hamburger && navLinks) {
        hamburger.onclick = () => navLinks.classList.toggle('open');
        navLinks.querySelectorAll('a').forEach(a => { a.onclick = () => navLinks.classList.remove('open'); });
      }
    }

    window.addEventListener('hashchange', () => router.render());
    window.addEventListener('load', () => { bindGlobalEvents(); router.render(); });

    // Click delegation for internal links
    document.addEventListener('click', (e) => {
      const link = e.target.closest('a[href^="#/"]');
      if (link) {
        e.preventDefault();
        const path = link.getAttribute('href').slice(1);
        router.navigate(path);
      }
    });

    // ===========================================
    // AUTH HELPERS
    // ===========================================
    async function initAuth() {
      const { data: { user } } = await sb.auth.getUser();
      if (user) {
        store.set('user', user);
        const { data: profile } = await sb.from('profiles').select('*').eq('id', user.id).single();
        store.set('profile', profile);
        store.set('isAdmin', profile?.role === 'admin');
      }
      renderNavUser();
    }

    async function signIn(email, password) {
      const { error } = await sb.auth.signInWithPassword({ email, password });
      if (error) throw error;
      await initAuth();
    }

    async function signUp(email, password, displayName) {
      const { error } = await sb.auth.signUp({
        email, password,
        options: { data: { display_name: displayName } }
      });
      if (error) throw error;
      toast('注册成功！请检查邮箱验证链接。');
    }

    async function signOut() {
      await sb.auth.signOut();
      store.set('user', null);
      store.set('profile', null);
      store.set('isAdmin', false);
      renderNavUser();
      router.navigate('/');
    }

    async function resetPassword(email) {
      const { error } = await sb.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + window.location.pathname + '#/reset-password'
      });
      if (error) throw error;
      toast('密码重置邮件已发送，请检查邮箱。');
    }

    async function updatePassword(newPassword) {
      const { error } = await sb.auth.updateUser({ password: newPassword });
      if (error) throw error;
      toast('密码已重置，请重新登录。');
    }

    function renderNavUser() {
      const user = store.get('user');
      const profile = store.get('profile');
      const container = document.getElementById('nav-user');
      if (user && profile) {
        const initial = (profile.display_name || user.email)[0].toUpperCase();
        container.innerHTML = `
          <a href="#/profile" style="display:flex;align-items:center;gap:8px;color:var(--color-text);font-size:0.9rem;">
            <span class="avatar">${profile.avatar_url ? `<img src="${profile.avatar_url}" alt="">` : initial}</span>
            <span class="nav-username">${profile.display_name}</span>
          </a>
          ${store.get('isAdmin') ? '<a href="#/admin" class="btn btn-outline btn-sm">管理</a>' : ''}
          <button class="btn btn-ghost btn-sm" id="btn-logout">退出</button>
        `;
        document.getElementById('btn-logout').onclick = signOut;
      } else {
        container.innerHTML = `<a href="#/login" class="btn btn-outline btn-sm">登录</a>`;
      }
    }

    // ===========================================
    // DATA HELPERS
    // ===========================================
    async function loadBooks() {
      const { data } = await sb.from('books').select('*').order('created_at', { ascending: false });
      store.set('books', data || []);
      return data || [];
    }

    async function loadEvents() {
      const { data } = await sb.from('events').select('*').order('event_date', { ascending: true });
      store.set('events', data || []);
      return data || [];
    }

    async function loadConfig() {
      const { data } = await sb.from('site_config').select('*');
      const config = {};
      (data || []).forEach(r => config[r.key] = r.value);
      store.set('config', config);
      return config;
    }

    async function getTodayCheckin() {
      const user = store.get('user');
      if (!user) return false;
      const today = dayjs().format('YYYY-MM-DD');
      const { data } = await sb.from('daily_checkins').select('*').eq('user_id', user.id).eq('checkin_date', today).maybeSingle();
      return !!data;
    }

    async function getMonthCheckinsFull(year, month) {
      const user = store.get('user');
      if (!user) return [];
      const start = dayjs(`${year}-${String(month).padStart(2,'0')}-01`).format('YYYY-MM-DD');
      const end = dayjs(start).endOf('month').format('YYYY-MM-DD');
      const { data } = await sb.from('daily_checkins').select('checkin_date, mood_color, excerpt, reflection, book_title').eq('user_id', user.id).gte('checkin_date', start).lte('checkin_date', end);
      return data || [];
    }

    async function doCheckin(payload) {
      const user = store.get('user');
      if (!user) { toast('请先登录', 'error'); return false; }
      const today = dayjs().format('YYYY-MM-DD');
      const { error } = await sb.from('daily_checkins').insert({
        user_id: user.id,
        checkin_date: today,
        book_title: payload.book_title || null,
        excerpt: payload.excerpt || null,
        reflection: payload.reflection || null,
        mood_color: payload.mood_color || null
      });
      if (error) {
        if (error.code === '23505') { toast('今天已经签到过了，请使用编辑功能', 'error'); }
        else { toast('签到失败：' + error.message, 'error'); }
        return false;
      }
      toast('签到成功！今天又读了一点 📖');
      return true;
    }

    async function updateCheckin(dateStr, payload) {
      const user = store.get('user');
      if (!user) { toast('请先登录', 'error'); return false; }
      const { error } = await sb.from('daily_checkins').update({
        book_title: payload.book_title || null,
        excerpt: payload.excerpt || null,
        reflection: payload.reflection || null,
        mood_color: payload.mood_color || null
      }).eq('user_id', user.id).eq('checkin_date', dateStr);
      if (error) { toast('更新失败：' + error.message, 'error'); return false; }
      toast('签到已更新 📝');
      return true;
    }

    async function getCheckinDetail(dateStr) {
      const user = store.get('user');
      if (!user) return null;
      const { data } = await sb.from('daily_checkins').select('*').eq('user_id', user.id).eq('checkin_date', dateStr).maybeSingle();
      return data;
    }

    // ===========================================
    // AI AUTO-FILL
    // ===========================================
    async function aiFillBookInfo(title, author) {
      const config = store.get('config');
      const apiKey = config.deepseek_api_key;
      const apiUrl = config.deepseek_api_url || 'https://api.deepseek.com/v1/chat/completions';

      if (!apiKey) { toast('请先在管理后台配置 DeepSeek API Key', 'error'); return null; }
      if (!title || !author) { toast('请先填写书名和作者', 'error'); return null; }

      const prompt = `请根据以下书籍信息，用中文生成内容。返回纯JSON格式，不要markdown代码块。

书名：《${title}》
作者：${author}

请生成以下三个字段：

1. 书籍简介（400-800字），可包括：书籍类型与文学流派、核心主题和思想、重要术语/概念解释、与其他作品的关联、成书过程中有趣的轶事。但避免透露具体情节转折、人物命运和故事结局。

2. 作者简介（400-800字），可包括：生卒年及重要生平事件、写作本书时的年龄和状态、主要成就（代表作品、获奖等）、写作风格特点、重要相关名人及关系。但避免透露具体情节转折、人物命运和故事结局。

3. 创作时代背景（300-600字），可包括：成书年代及出版年代的社会政治环境、经济文化背景、当时的文学/思想潮流、这些因素对作品的影响。但避免透露具体情节转折、人物命运和故事结局。

返回格式：{"description":"...","author_bio":"...","historical_context":"..."}`;

      let response;
      try {
        response = await fetch(apiUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
          body: JSON.stringify({
            model: 'deepseek-chat',
            messages: [{ role: 'user', content: prompt }],
            temperature: 0.7,
            max_tokens: 4000
          })
        });
      } catch (err) {
        toast('AI 请求失败：网络错误', 'error');
        return null;
      }

      if (!response.ok) {
        const errText = await response.text().catch(() => '');
        toast('AI 请求失败：' + response.status + (errText ? ' ' + errText.slice(0, 80) : ''), 'error');
        return null;
      }

      const data = await response.json();
      const content = data.choices?.[0]?.message?.content || '';

      // Parse JSON from response
      try {
        return JSON.parse(content);
      } catch {
        const match = content.match(/\{[\s\S]*\}/);
        if (match) {
          try { return JSON.parse(match[0]); } catch {}
        }
        toast('AI 返回格式异常，请重试', 'error');
        return null;
      }
    }

    // ===========================================
    // GENRE & STATUS HELPERS
    // ===========================================
    const GENRES = ['全部', '文学', '历史', '哲学', '科幻', '社科', '心理', '传记', '商业', '科普', '其他'];
    const STATUS_MAP = { upcoming: '即将开读', active: '正在共读', completed: '已读完' };

      if (!d) return '';
      return dayjs(d).format('YYYY年M月D日');
    }

    function formatDateTime(d) {
      if (!d) return '';
      return dayjs(d).format('YYYY年M月D日 HH:mm');
    }

    // ===========================================
    // CHECKIN UI HELPERS
    // ===========================================
    const MOODS = [
      { label: '无', value: '', cls: 'none' },
      { label: '朱砂', value: '#c4665a' },
      { label: '暖橙', value: '#d4a843' },
      { label: '秋叶', value: '#c17d4b' },
      { label: '青绿', value: '#6b9070' },
      { label: '黛蓝', value: '#5a7a8a' },
      { label: '烟紫', value: '#8b7b8b' },
      { label: '月白', value: '#c5d0d8' }
    ];

    function showCheckinForm(existing = null) {
      const isEdit = !!existing;
      const dateStr = existing ? existing.checkin_date : dayjs().format('YYYY-MM-DD');
      const currentMood = existing?.mood_color || '';

      const html = `
        <form id="checkin-form">
          <div class="form-group">
            <label>签到日期</label>
            <input type="date" value="${dateStr}" readonly disabled style="opacity:0.7;cursor:not-allowed;">
            <input type="hidden" name="checkin_date" value="${dateStr}">
          </div>

    async function refreshCalendar() {
      ensureCalState();
      calCheckinsData = await getMonthCheckinsFull(calYear, calMonth);
      const now = dayjs();
      const todayStr = now.format('YYYY-MM-DD');
      const map = new Map(calCheckinsData.map(c => [c.checkin_date, c]));

      const gridEl = document.getElementById('cal-grid');
      if (!gridEl) return;

      const firstDay = dayjs(`${calYear}-${String(calMonth).padStart(2,'0')}-01`);
      const daysInMonth = firstDay.daysInMonth();
      const startDayOfWeek = firstDay.day();
      const prevMonthDays = firstDay.subtract(1, 'day').daysInMonth();

      let cells = '';
      ['日','一','二','三','四','五','六'].forEach(d => { cells += `<div class="day-name">${d}</div>`; });
      for (let i = startDayOfWeek - 1; i >= 0; i--) {
        cells += `<div class="day other-month">${prevMonthDays - i}</div>`;
      }
      for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = firstDay.date(d).format('YYYY-MM-DD');
        const checkin = map.get(dateStr);
        let cls = 'day';
        if (checkin) {
          cls += ' checked';
        } else if (dateStr === todayStr) cls += ' today';
        else if (dayjs(dateStr).isAfter(now, 'day')) cls += ' future';
        const style = (checkin && checkin.mood_color)
          ? `style="--mood-dot:${checkin.mood_color}"` : '';
        const dataDate = checkin ? `data-date="${dateStr}"` : '';
        cells += `<div class="${cls}" ${style} ${dataDate}><span>${d}</span></div>`;
      }
      const totalCells = startDayOfWeek + daysInMonth;
      const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
      for (let d = 1; d <= remaining; d++) {
        cells += `<div class="day other-month"><span>${d}</span></div>`;
      }
      gridEl.innerHTML = cells;

      const label = document.getElementById('cal-month-label');
      if (label) label.textContent = `${calYear}年${calMonth}月`;

      // Update checkin button text
      const btn = document.getElementById('checkin-btn');
      if (btn) {
        const todayCheckin = calCheckinsData.find(c => c.checkin_date === todayStr);
        btn.textContent = todayCheckin ? '编辑今日签到' : '📖 今日签到';
        btn.classList.toggle('btn-ghost', !!todayCheckin);
      }
    }

    route('/profile', async () => {
      const profile = store.get('profile');
      if (!profile) return '<div class="container section"><div class="empty-state"><i data-lucide="loader"></i><p>加载中...</p></div></div>';

      // Reset calendar to current month on fresh navigation
      const now = dayjs();
      calYear = now.year();
      calMonth = now.month() + 1;
      calCheckinsData = await getMonthCheckinsFull(calYear, calMonth);
      const todayStr = now.format('YYYY-MM-DD');
      const todayCheckin = calCheckinsData.find(c => c.checkin_date === todayStr);

      // Build calendar grid HTML
      function calGridHTML() {
        const map = new Map(calCheckinsData.map(c => [c.checkin_date, c]));
        const firstDay = dayjs(`${calYear}-${String(calMonth).padStart(2,'0')}-01`);
        const daysInMonth = firstDay.daysInMonth();
        const startDayOfWeek = firstDay.day();
        const prevMonthDays = firstDay.subtract(1, 'day').daysInMonth();

        let cells = '';
        ['日','一','二','三','四','五','六'].forEach(d => { cells += `<div class="day-name">${d}</div>`; });
        for (let i = startDayOfWeek - 1; i >= 0; i--) {
          cells += `<div class="day other-month">${prevMonthDays - i}</div>`;
        }
        for (let d = 1; d <= daysInMonth; d++) {
          const dateStr = firstDay.date(d).format('YYYY-MM-DD');
          const checkin = map.get(dateStr);
          let cls = 'day';
          if (checkin) {
            cls += ' checked';
          } else if (dateStr === todayStr) cls += ' today';
          else if (dayjs(dateStr).isAfter(now, 'day')) cls += ' future';
          const style = (checkin && checkin.mood_color)
            ? `style="--mood-dot:${checkin.mood_color}"` : '';
          const dataDate = checkin ? `data-date="${dateStr}"` : '';
          cells += `<div class="${cls}" ${style} ${dataDate}><span>${d}</span></div>`;
        }
        const totalCells = startDayOfWeek + daysInMonth;
        const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
        for (let d = 1; d <= remaining; d++) {
          cells += `<div class="day other-month">${d}</div>`;
        }
        return cells;
      }

      return `
        <div class="container section">
          <div style="display:flex;gap:var(--space-4);flex-wrap:wrap;align-items:flex-start;">
            <div style="width:100%;max-width:320px;">
              <div class="card">
                <div class="card-body" style="text-align:center;">
                  <div style="width:80px;height:80px;border-radius:50%;background:var(--color-accent-bg);margin:0 auto var(--space-2);display:flex;align-items:center;justify-content:center;font-size:1.8rem;font-weight:700;color:var(--color-accent);overflow:hidden;">
                    ${profile.avatar_url ? `<img src="${profile.avatar_url}" alt="" style="width:100%;height:100%;object-fit:cover;">` : (profile.display_name || '?')[0].toUpperCase()}
                  </div>
                  <h3>${profile.display_name}</h3>
                  ${profile.bio ? `<p style="color:var(--color-text-2);font-size:0.9rem;margin:8px 0;">${profile.bio}</p>` : ''}
                  ${profile.city ? `<div style="font-size:0.85rem;color:var(--color-text-3);"><i data-lucide="map-pin" style="width:14px;height:14px;display:inline;vertical-align:-2px;"></i> ${profile.city}</div>` : ''}

                </div>

                <div class="card-body">
                  <div class="calendar">
                    <div class="calendar-header">
                      <button class="btn btn-ghost btn-sm" id="cal-prev"><i data-lucide="chevron-left" style="width:18px;height:18px;"></i></button>
                      <h4 id="cal-month-label">${calYear}年${calMonth}月</h4>
                      <button class="btn btn-ghost btn-sm" id="cal-next"><i data-lucide="chevron-right" style="width:18px;height:18px;"></i></button>
                    </div>
                    <div class="calendar-grid" id="cal-grid">${calGridHTML()}</div>
                  </div>

          </div>

      `;

    document.addEventListener('click', async (e) => {

      if (calPrev) {
        calMonth--;
        if (calMonth < 1) { calMonth = 12; calYear--; }
        await refreshCalendar();
        return;
      }
      // Calendar: next month
      const calNext = e.target.closest('#cal-next');
      if (calNext) {
        calMonth++;
        if (calMonth > 12) { calMonth = 1; calYear++; }
        await refreshCalendar();
        return;
      }
      // Checkin button
      const checkinBtn = e.target.closest('#checkin-btn');
      if (checkinBtn) {
        const today = dayjs().format('YYYY-MM-DD');
        const todayCheckin = calCheckinsData.find(c => c.checkin_date === today);

        const checkin = await getCheckinDetail(calDay.dataset.date);
        if (checkin) showCheckinDetail(checkin);

      // Edit checkin from detail modal

    // Admin: add/edit book form
    function showBookForm(bookData = null) {
      const isEdit = !!bookData;
      const book = bookData || { title:'', author:'', author_country:'', author_gender:'', translator:'', translator_gender:'', publisher:'', word_count:'', cover_url:'', genre:'文学', description:'', author_bio:'', historical_context:'', status:'upcoming', edition_guide:'[]', reading_schedule:'', host_intro:'', host_notes:'', activities:'[]', resources:'{"extended_reading":[],"text_materials":[],"film_resources":[]}', start_date:'', end_date:'' };
      const genres = ['文学','历史','哲学','科幻','社科','心理','传记','商业','科普','其他'];
      // Parse JSONB data for visual builders
      let acts=[], edns=[], extR=[], txtM=[], filmR=[];
      try { acts = typeof book.activities==='string' ? JSON.parse(book.activities||'[]') : (book.activities||[]); } catch(e){}
      try { edns = typeof book.edition_guide==='string' ? JSON.parse(book.edition_guide||'[]') : (book.edition_guide||[]); } catch(e){}
      try {
        const res = typeof book.resources==='string' ? JSON.parse(book.resources||'{}') : (book.resources||{});
        extR = res.extended_reading||[]; txtM = res.text_materials||[]; filmR = res.film_resources||[];
      } catch(e){}

      const formHtml = `

            <div class="form-group"><label>作者国别</label><input type="text" name="author_country" value="${book.author_country || ''}"></div>
            <div class="form-group"><label>作者性别</label><input type="text" name="author_gender" value="${book.author_gender || ''}"></div>
            <div class="form-group"><label>译者</label><input type="text" name="translator" value="${book.translator || ''}"></div>
            <div class="form-group"><label>译者性别</label><input type="text" name="translator_gender" value="${book.translator_gender || ''}"></div>
            <div class="form-group"><label>出版方</label><input type="text" name="publisher" value="${book.publisher || ''}"></div>
            <div class="form-group"><label>字数</label><input type="number" name="word_count" value="${book.word_count || ''}"></div>
            <div class="form-group"><label>类型 *</label><select name="genre" required>${genres.map(g => `<option value="${g}" ${book.genre === g ? 'selected' : ''}>${g}</option>`).join('')}</select></div>
            <div class="form-group"><label>共读状态 *</label><select name="status">
              <option value="upcoming" ${book.status === 'upcoming' ? 'selected' : ''}>即将开读</option>
              <option value="active" ${book.status === 'active' ? 'selected' : ''}>正在共读</option>
              <option value="completed" ${book.status === 'completed' ? 'selected' : ''}>已读完</option>
            </select></div>
            <div class="form-group"><label>开始日期 *</label><input type="date" name="start_date" value="${book.start_date || ''}" required></div>
            <div class="form-group"><label>结束日期 *</label><input type="date" name="end_date" value="${book.end_date || ''}" required></div>
          </div>

          <!-- Cover image: URL + upload -->
          <div class="form-group">
            <label>封面图 *</label>
            <div class="cover-upload">
              <div class="cover-preview" id="cover-preview">
                ${book.cover_url ? `<img src="${book.cover_url}" alt="">` : '<i data-lucide="image" style="width:28px;height:28px;color:var(--color-text-3);"></i>'}
              </div>
              <div class="cover-inputs">
                <input type="url" name="cover_url" value="${book.cover_url || ''}" placeholder="粘贴图片 URL" id="cover-url-input" oninput="const p=document.getElementById('cover-preview');const v=this.value;if(v){p.innerHTML='<img src='+v+' alt=>';}else{p.innerHTML='<i data-lucide=image style=width:28px;height:28px;color:var(--color-text-3);></i>';lucide.createIcons();}" required>
                <div class="divider-text">或</div>
                <input type="file" accept="image/*" id="cover-file-input" style="font-size:0.85rem;">
              </div>
            </div>
          </div>

          <div style="display:flex;align-items:center;gap:8px;margin-bottom:var(--space-1);">
            <button type="button" class="btn btn-outline btn-sm" id="btn-ai-fill">🤖 AI 自动填充简介</button>
            <span style="font-size:0.78rem;color:var(--color-text-3);">AI 自动编写书籍简介、作者简介、时代背景（不剧透）</span>
          </div>
          <div class="form-group"><label>书籍简介（Markdown）</label><textarea name="description" style="min-height:60px;">${book.description || ''}</textarea></div>
          <div class="form-group"><label>作者简介（Markdown）</label><textarea name="author_bio" style="min-height:60px;">${book.author_bio || ''}</textarea></div>
          <div class="form-group"><label>创作时代背景（Markdown）</label><textarea name="historical_context" style="min-height:60px;">${book.historical_context || ''}</textarea></div>

          <!-- Visual Builder: Edition Guide -->
          <div class="builder-section">
            <label>📖 版本建议</label>
            <div class="builder-items" id="builder-editions">${edns.length ? edns.map(ednItem).join('') : '<div class="builder-item" style="text-align:center;color:var(--color-text-3);padding:12px;font-size:0.85rem;">暂无版本</div>'}</div>
            <button type="button" class="btn-add-row" data-action="add-edition">+ 添加版本</button>
          </div>

          <div class="form-group"><label>共读时间计划（Markdown）</label><textarea name="reading_schedule" style="min-height:100px;">${book.reading_schedule || ''}</textarea></div>
          <div class="form-group"><label>领读人简介（Markdown）</label><textarea name="host_intro" style="min-height:80px;">${book.host_intro || ''}</textarea></div>
          <div class="form-group"><label>领读碎碎念（Markdown）</label><textarea name="host_notes" style="min-height:80px;">${book.host_notes || ''}</textarea></div>

          <!-- Visual Builder: Activities (unified) -->
          <div class="builder-section">
            <label>📅 活动安排</label>
            <div class="builder-items" id="builder-acts">${acts.length ? acts.map(actItem).join('') : '<div class="builder-item" style="text-align:center;color:var(--color-text-3);padding:12px;font-size:0.85rem;">暂无活动</div>'}</div>
            <button type="button" class="btn-add-row" data-action="add-activity">+ 添加活动</button>
          </div>

          <!-- Visual Builder: Resources -->
          <div class="builder-section">
            <label>📚 资源材料</label>
            <div class="res-section">
              <h5>延伸读物</h5>
              <div class="builder-items" id="builder-ext">${extR.length ? extR.map(resItem).join('') : '<div class="builder-item" style="text-align:center;color:var(--color-text-3);padding:12px;font-size:0.85rem;">暂无</div>'}</div>

            </div>
            <div class="res-section">
              <h5>影视资源</h5>
              <div class="builder-items" id="builder-film">${filmR.length ? filmR.map(resItem).join('') : '<div class="builder-item" style="text-align:center;color:var(--color-text-3);padding:12px;font-size:0.85rem;">暂无</div>'}</div>
              <button type="button" class="btn-add-row" data-action="add-film">+ 添加影视资源</button>

          <button type="submit" class="btn btn-primary">${isEdit ? '保存修改' : '添加书籍'}</button>
          <input type="hidden" name="book_id" value="${book.id || ''}">
        </form>`;
      const modal = showModal(isEdit ? '编辑书籍' : '添加书籍', formHtml, () => {
        document.removeEventListener('submit', bookFormHandler);
      });
      document.addEventListener('submit', bookFormHandler);
      function bookFormHandler(e) {
        if (e.target.id !== 'book-edit-form') return;
        e.preventDefault();
        const fd = new FormData(e.target);
        const data = Object.fromEntries(fd.entries());

        // Collect from visual builders
        function collectItems(containerId, fields) {
          const items = document.querySelectorAll(`#${containerId} .builder-item`);
          return Array.from(items).map(item => {
            const obj = {};
            fields.forEach(f => { const el = item.querySelector(`[name="${f}"]`); if (el) obj[f] = el.value; });
            return obj;
          }).filter(obj => Object.values(obj).some(v => v.trim()));
        }

        // Edition guide
        const edns = collectItems('builder-editions', ['edn_name','edn_translator','edn_publisher','edn_pros','edn_cons','edn_buy_link','edn_douban_link']).map(o => ({
          name: o.edn_name||'', translator: o.edn_translator||'', publisher: o.edn_publisher||'',
          pros: o.edn_pros||'', cons: o.edn_cons||'', buy_link: o.edn_buy_link||'', douban_link: o.edn_douban_link||''
        }));
        data.edition_guide = JSON.stringify(edns);

        // Activities (unified)
        data.activities = collectItems('builder-acts', ['act_type','act_title','act_time','act_status','act_meeting_link','act_replay_link','act_guests','act_desc']).map(o => ({
          type: o.act_type||'导读预热', title: o.act_title||'', time: o.act_time||'',
          status: o.act_status||'计划中', meeting_link: o.act_meeting_link||'',
          replay_link: o.act_replay_link||'', guests: o.act_guests||'', description: o.act_desc||''
        }));

        // Resources
        const extR = collectItems('builder-ext', ['res_title','res_url','res_desc']).map(o => ({ title: o.res_title||'', url: o.res_url||'', description: o.res_desc||'' }));
        const txtM = collectItems('builder-txt', ['res_title','res_url','res_desc']).map(o => ({ title: o.res_title||'', url: o.res_url||'', description: o.res_desc||'' }));
        const filmR = collectItems('builder-film', ['res_title','res_url','res_desc']).map(o => ({ title: o.res_title||'', url: o.res_url||'', description: o.res_desc||'' }));
        data.resources = { extended_reading: extR, text_materials: txtM, film_resources: filmR };

        // Clean up — remove builder field names not in books table
        delete data.online_activities; delete data.meeting_replays; delete data.isbn; delete data.page_count;
        ['edn_name','edn_translator','edn_publisher','edn_pros','edn_cons','edn_buy_link','edn_douban_link',
         'act_type','act_title','act_time','act_status','act_meeting_link','act_replay_link','act_guests','act_desc',
         'res_title','res_url','res_desc'].forEach(f => delete data[f]);
        data.word_count = data.word_count ? parseInt(data.word_count) : null;
        saveBook(data, data.book_id);
        modal.remove();
        document.removeEventListener('submit', bookFormHandler);
      }
    }

    async function saveBook(data, id) {
      const payload = { ...data };
      delete payload.book_id;
      payload.updated_at = new Date().toISOString();
      if (!id) payload.created_by = store.get('user').id;

      let error;
      if (id) {
        ({ error } = await sb.from('books').update(payload).eq('id', id));
      } else {
        ({ error } = await sb.from('books').insert(payload));
      }
      if (error) { toast('保存失败：' + error.message, 'error'); return; }
      toast(id ? '书籍已更新' : '书籍已添加');
      router.render();
    }

    async function deleteBook(id) {
      if (!confirm('确定要删除这本书吗？')) return;
      const { error } = await sb.from('books').delete().eq('id', id);
      if (error) { toast('删除失败：' + error.message, 'error'); return; }

      router.render();
    }

    // Admin button handlers
    document.addEventListener('click', async (e) => {
      // This handler is async because of AI fill button
      const addBookBtn = e.target.closest('#btn-add-book, #btn-add-book2');
      if (addBookBtn) { showBookForm(); return; }
      const addEventBtn = e.target.closest('#btn-add-event');
      if (addEventBtn) { showEventForm(); return; }
      const editBookBtn = e.target.closest('.btn-edit-book');
      if (editBookBtn) {
        const id = editBookBtn.dataset.id;
        const book = store.get('books').find(b => String(b.id) === id);
        if (book) showBookForm(book);
        return;
      }
      const delBookBtn = e.target.closest('.btn-del-book');
      if (delBookBtn) { deleteBook(delBookBtn.dataset.id); return; }
      const editEventBtn = e.target.closest('.btn-edit-event');
      if (editEventBtn) {
        const id = editEventBtn.dataset.id;
        const event = store.get('events').find(ev => String(ev.id) === id);
        if (event) showEventForm(event);
        return;
      }
      const delEventBtn = e.target.closest('.btn-del-event');
      if (delEventBtn) { deleteEvent(delEventBtn.dataset.id); return; }

      // Visual builder: add buttons
      const addBtn = e.target.closest('.btn-add-row');
      if (addBtn) {
        const action = addBtn.dataset.action;
        const map = {
          'add-edition':  { container: 'builder-editions', html: ednItem() },
          'add-activity': { container: 'builder-acts', html: actItem() },
          'add-ext':      { container: 'builder-ext', html: resItem() },
          'add-txt':      { container: 'builder-txt', html: resItem() },
          'add-film':     { container: 'builder-film', html: resItem() }
        };
        const cfg = map[action];
        if (cfg) {
          const container = document.getElementById(cfg.container);
          if (container) {
            // Remove empty placeholder
            const placeholder = container.querySelector('.builder-item[style]');
            if (placeholder) placeholder.remove();
            container.insertAdjacentHTML('beforeend', cfg.html);
          }
        }
        return;
      }

      // AI fill button in book form
      const aiBtn = e.target.closest('#btn-ai-fill');
      if (aiBtn) {
        aiBtn.disabled = true;
        aiBtn.textContent = '⏳ AI 正在搜索编写...';
        const modal = aiBtn.closest('.modal');
        const titleEl = modal?.querySelector('[name="title"]');
        const authorEl = modal?.querySelector('[name="author"]');
        const descEl = modal?.querySelector('[name="description"]');
        const bioEl = modal?.querySelector('[name="author_bio"]');
        const ctxEl = modal?.querySelector('[name="historical_context"]');
        const result = await aiFillBookInfo(titleEl?.value || '', authorEl?.value || '');
        if (result) {
          if (descEl) descEl.value = result.description || '';
          if (bioEl) bioEl.value = result.author_bio || '';
          if (ctxEl) ctxEl.value = result.historical_context || '';
          toast('AI 内容已填充，请检查修改 ✨');
        }
        aiBtn.disabled = false;
        aiBtn.textContent = '🤖 AI 自动填充简介';
        return;
      }
    });

    // ===========================================
    // COVER UPLOAD
    // ===========================================
    document.addEventListener('change', async (e) => {
      if (e.target.id !== 'cover-file-input') return;
      const file = e.target.files[0];
      if (!file) return;
      const path = `${Date.now()}_${file.name}`;
      const { data, error } = await sb.storage.from('covers').upload(path, file);
      if (error) { toast('封面上传失败：' + error.message, 'error'); return; }
      const { data: { publicUrl } } = sb.storage.from('covers').getPublicUrl(path);
      const urlInput = document.getElementById('cover-url-input');
      const preview = document.getElementById('cover-preview');
      if (urlInput) urlInput.value = publicUrl;
      if (preview) { preview.innerHTML = `<img src="${publicUrl}" alt="">`; }
      toast('封面上传成功');
    });

    // ===========================================
    // INIT
    // ===========================================
    async function init() {
      try {
        await initAuth();
      } catch (err) {
        console.error('Init error:', err);
      }
    }

    init().catch(err => console.error('Init error:', err));
  </script>
</body>
</html>
